name: Build APK From ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - source.zip
      - .github/workflows/build-from-zip.yml

permissions:
  contents: read

env:
  ANDROID_NDK_VERSION: 29.0.14206865

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip source
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y unzip git ninja-build
          test -f source.zip
          rm -rf work
          mkdir -p work
          unzip -q source.zip -d work
          SETTINGS_FILE="$(find work -name "settings.gradle.kts" -o -name "settings.gradle" | head -n 1)"
          test -n "$SETTINGS_FILE"
          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project dir: $PROJECT_DIR"
          ls -la "$PROJECT_DIR"

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;$ANDROID_NDK_VERSION" \
            "cmake;3.22.1"

      - name: Restore mihomo core
        shell: bash
        run: |
          set -euxo pipefail
          cd "$PROJECT_DIR"
          rm -rf core/src/foss/golang/clash
          mkdir -p core/src/foss/golang
          git clone --depth=1 --branch Alpha https://github.com/MetaCubeX/mihomo.git core/src/foss/golang/clash

      - name: Make Gradle executable
        shell: bash
        run: |
          set -euxo pipefail
          cd "$PROJECT_DIR"
          chmod +x ./gradlew

      - name: Build APK
        shell: bash
        run: |
          set -euxo pipefail
          cd "$PROJECT_DIR"
          ./gradlew --no-daemon :app:assembleAlphaRelease --stacktrace
          find . -type f -name "*.apk" -print

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cmfa-alpha-release-apk
          if-no-files-found: error
          path: ${{ env.PROJECT_DIR }}/**/build/outputs/**/*.apk
