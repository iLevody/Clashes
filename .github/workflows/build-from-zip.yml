name: Build APK From ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - source.zip
      - .github/workflows/build-from-zip.yml

permissions:
  contents: read

env:
  ANDROID_NDK_VERSION: 29.0.14206865

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip source
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y unzip git ninja-build
          test -f source.zip
          rm -rf work
          mkdir -p work
          unzip -q source.zip -d work
          SETTINGS_FILE="$(find work \( -name "settings.gradle.kts" -o -name "settings.gradle" \) | head -n 1)"
          test -n "$SETTINGS_FILE"
          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project dir: $PROJECT_DIR"
          ls -la "$PROJECT_DIR"

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euxo pipefail
          {
            yes | sdkmanager --licenses >/dev/null

            sdkmanager --install \
              "platform-tools" \
              "platforms;android-35" \
              "build-tools;35.0.0" \
              "cmake;3.22.1"

            AVAILABLE_NDKS="$(sdkmanager --list | awk -F'|' '/^[[:space:]]*ndk;[0-9]/{gsub(/^[[:space:]]+|[[:space:]]+$/, "", $1); print $1}')"
            echo "Available NDK packages:"
            echo "$AVAILABLE_NDKS"

            REQUESTED_NDK="ndk;$ANDROID_NDK_VERSION"
            if echo "$AVAILABLE_NDKS" | grep -Fxq "$REQUESTED_NDK"; then
              NDK_PACKAGE="$REQUESTED_NDK"
            else
              echo "Requested NDK $REQUESTED_NDK is not listed by sdkmanager; using latest listed NDK instead."
              NDK_PACKAGE="$(echo "$AVAILABLE_NDKS" | sort -V | tail -n 1)"
            fi

            if [ -z "$NDK_PACKAGE" ]; then
              echo "No Android NDK package found in sdkmanager --list."
              exit 1
            fi

            echo "Installing $NDK_PACKAGE"
            sdkmanager --install "$NDK_PACKAGE"
          } 2>&1 | tee "$RUNNER_TEMP/android-sdk-install.log"

      - name: Upload Android SDK install log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-sdk-install-log
          if-no-files-found: ignore
          path: ${{ runner.temp }}/android-sdk-install.log

      - name: Restore mihomo core
        shell: bash
        run: |
          set -euxo pipefail
          cd "$PROJECT_DIR"
          rm -rf core/src/foss/golang/clash
          mkdir -p core/src/foss/golang
          git clone --depth=1 --branch Alpha https://github.com/MetaCubeX/mihomo.git core/src/foss/golang/clash

      - name: Make Gradle executable
        shell: bash
        run: |
          set -euxo pipefail
          cd "$PROJECT_DIR"
          chmod +x ./gradlew

      - name: Build APK
        shell: bash
        run: |
          set -euxo pipefail
          cd "$PROJECT_DIR"
          ./gradlew --no-daemon :app:assembleAlphaRelease --stacktrace --info 2>&1 | tee "$RUNNER_TEMP/gradle-build.log"
          find . -type f -name "*.apk" -print

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          if-no-files-found: ignore
          path: ${{ runner.temp }}/gradle-build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cmfa-alpha-release-apk
          if-no-files-found: error
          path: ${{ env.PROJECT_DIR }}/**/build/outputs/**/*.apk
