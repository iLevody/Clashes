name: Build APK from ZIP

on:
  workflow_dispatch:
  push:
    paths:
      - "*.zip"
      - ".github/workflows/build-zip-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip source
        run: |
          rm -rf extracted
          mkdir extracted

          echo "Files in repository:"
          ls -la

          ZIP_FILE=$(find . -maxdepth 1 -type f -iname "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            exit 1
          fi

          echo "Using ZIP file: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted

          PROJECT_FILE=$(find extracted -type f \( -name "settings.gradle.kts" -o -name "settings.gradle" \) | head -n 1)

          if [ -z "$PROJECT_FILE" ]; then
            echo "No Gradle project found after unzip."
            find extracted -maxdepth 3 -type f | head -n 80
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project dir: $PROJECT_DIR"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Collect APK
        run: |
          rm -rf apk-output
          mkdir -p apk-output

          echo "Searching APK files..."
          find "$PROJECT_DIR" -type f -name "*.apk" -print

          find "$PROJECT_DIR" -type f -name "*.apk" -exec cp -v {} apk-output/ \;

          echo "Collected APK files:"
          ls -la apk-output

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 好啊有-APK
          path: apk-output/*.apk
