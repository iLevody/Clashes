name: Build APK from ZIP

on:
  workflow_dispatch:
  push:
    paths:
      - "*.zip"
      - ".github/workflows/build-zip-apk.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workflow version
        shell: bash
        run: |
          echo "好啊有 ZIP APK workflow fixed version 2026-06-20-7-soft-ui"

      - name: Pick, unzip, and normalize source path
        shell: bash
        run: |
          set -euo pipefail

          rm -rf extracted project-src apk-output gradle-build.log
          mkdir -p extracted project-src

          echo "Repository files:"
          ls -la

          # Prefer the newest soft/minimal UI package, then other HaoAYou packages, then any ZIP.
          ZIP_FILE="$(find . -maxdepth 1 -type f \( -iname "*soft*minimal*.zip" -o -iname "*minimal*ui*.zip" -o -iname "*soft*ui*.zip" \) | sort | head -n 1 || true)"

          if [ -z "$ZIP_FILE" ]; then
            ZIP_FILE="$(find . -maxdepth 1 -type f \( -iname "*HaoAYou*.zip" -o -iname "*haoyou*.zip" -o -iname "*好啊有*.zip" \) | sort | head -n 1 || true)"
          fi

          if [ -z "$ZIP_FILE" ]; then
            ZIP_FILE="$(find . -maxdepth 1 -type f -iname "*.zip" | sort | head -n 1 || true)"
          fi

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            exit 1
          fi

          echo "Using ZIP file: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted

          PROJECT_FILE="$(find extracted -type f \( -name "settings.gradle.kts" -o -name "settings.gradle" \) | head -n 1 || true)"

          if [ -z "$PROJECT_FILE" ]; then
            echo "No Gradle project found after unzip."
            find extracted -maxdepth 4 -type f | head -n 120
            exit 1
          fi

          RAW_PROJECT_DIR="$(dirname "$PROJECT_FILE")"
          echo "Raw project dir: $RAW_PROJECT_DIR"
          cp -a "$RAW_PROJECT_DIR"/. project-src/
          echo "PROJECT_DIR=project-src" >> "$GITHUB_ENV"
          echo "Project dir normalized to: project-src"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Prepare Android SDK
        shell: bash
        run: |
          set -euo pipefail

          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -path "*/bin/sdkmanager" -type f | sort | tail -n 1 || true)"
          fi

          if [ -z "$SDKMANAGER" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found."
            exit 1
          fi

          echo "Using sdkmanager: $SDKMANAGER"
          (yes | "$SDKMANAGER" --sdk_root="$ANDROID_HOME" --licenses >/dev/null 2>&1) || true

          "$SDKMANAGER" --sdk_root="$ANDROID_HOME" --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "cmake;3.22.1" \
            "ndk;29.0.14206865"

          (yes | "$SDKMANAGER" --sdk_root="$ANDROID_HOME" --licenses >/dev/null 2>&1) || true

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-download-base-url: https://github.com/MetaCubeX/go/releases/download/build
          go-version: "1.26"

      - name: Ensure mihomo core source exists
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          if [ ! -d "core/src/foss/golang/clash" ] || [ -z "$(ls -A core/src/foss/golang/clash 2>/dev/null || true)" ]; then
            echo "mihomo core source is missing. Cloning..."
            rm -rf core/src/foss/golang/clash
            mkdir -p core/src/foss/golang
            git clone --depth 1 --branch Alpha https://github.com/MetaCubeX/mihomo core/src/foss/golang/clash
          else
            echo "mihomo core source already exists."
          fi

      - name: Apply Go patches
        shell: bash
        run: |
          set -euo pipefail

          PATCH_DIR="$GITHUB_WORKSPACE/$PROJECT_DIR/.github/patch"
          if [ -d "$PATCH_DIR" ]; then
            cd "$(go env GOROOT)"
            for p in "$PATCH_DIR"/*.patch; do
              [ -f "$p" ] || continue
              echo "Applying patch: $p"
              patch --verbose -p 1 < "$p"
            done
          else
            echo "No patch directory found."
          fi

      - name: Update CA bundle
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          sudo apt-get update
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates

          mkdir -p core/src/foss/golang/clash/component/ca
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Patch CMake git metadata for ZIP builds
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          python3 - <<'PY'
          from pathlib import Path
          p = Path("core/src/main/cpp/CMakeLists.txt")
          s = p.read_text(encoding="utf-8")
          marker = "project(clash-bridge C)"
          if marker not in s:
              raise SystemExit("CMake marker not found")
          rest = s[s.index(marker):]
          prefix = r'''cmake_minimum_required(VERSION 3.0)

          message(STATUS "CMAKE_CURRENT_SOURCE_DIR= ${CMAKE_CURRENT_SOURCE_DIR}")

          set(COMMIT_HASH "zipbuild")
          set(CURRENT_BRANCH "alpha")

          string(TIMESTAMP COMPILE_TIME "%y%m%d")
          string(REGEX REPLACE "[\n\t\r]" "" COMPILE_TIME "${COMPILE_TIME}")
          string(REGEX REPLACE "\"" "" COMPILE_TIME "${COMPILE_TIME}")

          set(GIT_VERSION "${CURRENT_BRANCH}_${COMMIT_HASH}_${COMPILE_TIME}")
          message(STATUS "git hash= ${COMMIT_HASH}")
          message(STATUS "git current branch = ${CURRENT_BRANCH}")
          message(STATUS "version info = ${GIT_VERSION}")

          string(REGEX REPLACE "[ ]+" "" GIT_VERSION "${GIT_VERSION}")
          configure_file(${CMAKE_CURRENT_SOURCE_DIR}/version.h.in ${CMAKE_CURRENT_SOURCE_DIR}/version.h @ONLY)

          '''
          p.write_text(prefix + rest, encoding="utf-8")
          print("Patched", p)
          PY

          sed -n '1,45p' core/src/main/cpp/CMakeLists.txt

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          cd "$PROJECT_DIR"
          chmod +x ./gradlew

          ./gradlew --no-daemon app:assembleAlphaDebug --stacktrace 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"
          BUILD_STATUS=${PIPESTATUS[0]}

          if [ "$BUILD_STATUS" -ne 0 ]; then
            echo "Gradle build failed. Error summary:"
            grep -Ei "FAILURE:|What went wrong|Execution failed|Caused by:|error:|No such file|Exception|CMake Error" "$GITHUB_WORKSPACE/gradle-build.log" | tail -n 120 || true
            exit "$BUILD_STATUS"
          fi

      - name: Collect APK
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf apk-output
          mkdir -p apk-output

          echo "Searching APK files..."
          find "$PROJECT_DIR" -type f -name "*.apk" -print
          find "$PROJECT_DIR" -type f -name "*.apk" -exec cp -v {} apk-output/ \;

          APK_COUNT="$(find apk-output -type f -name "*.apk" | wc -l)"
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "No APK files were generated."
            exit 1
          fi

          echo "Collected APK files:"
          ls -la apk-output

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 好啊有-APK
          path: apk-output/*.apk

      - name: Upload Gradle build log when failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
