name: Build APK from ZIP

on:
  workflow_dispatch:
  push:
    paths:
      - "*.zip"
      - ".github/workflows/build-zip-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip source
        shell: bash
        run: |
          set -euo pipefail

          rm -rf extracted
          mkdir -p extracted

          ZIP_FILE=$(ls -t *.zip 2>/dev/null | head -n 1 || true)
          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            find . -maxdepth 2 -type f | sort
            exit 1
          fi

          echo "Using ZIP: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted

          PROJECT_FILE=$(find extracted \( -name "settings.gradle.kts" -o -name "settings.gradle" \) | head -n 1 || true)
          if [ -z "$PROJECT_FILE" ]; then
            echo "No Gradle project found: settings.gradle or settings.gradle.kts is missing."
            echo "Files extracted:"
            find extracted -maxdepth 4 -type f | sort | head -n 200
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project dir: $PROJECT_DIR"

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 好啊有-APK
          path: |
            ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
