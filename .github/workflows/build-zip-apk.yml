name: Build APK from ZIP

on:
  workflow_dispatch:
  push:
    paths:
      - "*.zip"
      - ".github/workflows/build-zip-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip source
        run: |
          rm -rf extracted
          mkdir extracted

          echo "Files in repository:"
          ls -la

          ZIP_FILE=$(find . -maxdepth 1 -type f -iname "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            exit 1
          fi

          echo "Using ZIP file: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted

          PROJECT_FILE=$(find extracted -type f \( -name "settings.gradle.kts" -o -name "settings.gradle" \) | head -n 1)

          if [ -z "$PROJECT_FILE" ]; then
            echo "No Gradle project found after unzip."
            find extracted -maxdepth 3 -type f | head -n 50
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project dir: $PROJECT_DIR"

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 好啊有-APK
          path: |
            ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
